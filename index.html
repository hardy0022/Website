<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UT Website | Interactive Hero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loader">
        <p>Loading Experience...</p>
    </div>

    <!-- Animation Container -->
    <div class="animation-wrapper">
        <canvas id="hero-canvas"></canvas>
    </div>

    <!-- Scrollable Content -->
    <main>
        <section class="spacer">
            <h1>Dynamic Vision</h1>
            <p>Scroll to explore the sequence.</p>
        </section>
        
        <section class="spacer">
            <h2>Smooth Performance</h2>
            <p>Optimized with WebP and Canvas.</p>
        </section>

        <section class="spacer">
            <h2>Production Ready</h2>
            <p>Ready for deployment.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
