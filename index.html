<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UT Custom Keyboards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <p>Loading Engineering Quality...</p>
    </div>

    <div class="animation-wrapper">
        <canvas id="hero-canvas"></canvas>
    </div>

    <main>
        <section class="hero-text fade-section">
            <p class="location-tag">📍 Jammu & Kashmir | Pan-India Service Available</p>
            <h1>Electronics Engineer & <br>Custom Keyboard Specialist</h1>
            
            <div class="details">
                <span class="badge">Switch Lubing</span>
                <span class="badge">Custom Builds</span>
                <span class="badge">PCB Design & Repair</span>
            </div>

            <p class="bio">
                From hobby mods to full custom keyboard builds <br>
                with precision engineering quality.
            </p>

            <div class="cta-buttons">
                <a href="https://discord.gg/yourlink" class="btn primary">Contact on Discord</a>
                <a href="#services" class="btn secondary">View Services</a>
            </div>
        </section>

        <div class="scroll-buffer"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
